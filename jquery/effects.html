<html>
    <head>
        <link rel="stylesheet" href="styles.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
    </head>
    <body>
<button id="hide">Hide</button>
<button id="show">Show</button>

<div id="box"></div>

<script>

$(document).ready(function(){

$("#hide").click(function(){

$("#box").hide()

})

$("#show").click(function(){

$("#box").show()

})

})

</script>
</body>
</html>
