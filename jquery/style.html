<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    </head>
    <body>
        <p id="text">Hello Students</p>
        <button id="color">Change Color</button>
        <script>

$(document).ready(function(){

$("#color").click(function(){

$("#text").css("color","red")

})

})

</script>
</body>
</html>
