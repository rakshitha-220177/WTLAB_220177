<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<body>
<h2>jQuery Selectors</h2>

<p>This is paragraph 1</p>
<p>This is paragraph 2</p>

$("#hide").click(function(){

$("p").hide()

})

})

</script>
