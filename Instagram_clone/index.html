<!DOCTYPE html>
<html>
<head>
<title>Instagram</title>

<style>

/* page background */
body{
background-color:black;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}

/* top bar */
.icons{
background-color:black;
color:white;
font-size:40px;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
border-bottom:1px solid #333;
}

/* instagram text */
.logo{
font-weight:bold;
font-size:32px;
letter-spacing:2px;
}

/* story section */
.story-section{
margin:20px;
text-align:center;
}

.story-section img{
border-radius:50%;
border:3px solid #ff0066;
padding:3px;
transition:transform 0.3s;
}

.story-section img:hover{
transform:scale(1.1);
}

/* videos */
video{
border-radius:10px;
box-shadow:0px 0px 10px rgba(255,255,255,0.2);
margin:20px auto;
display:block;
}

/* welcome text */
h2{
margin-top:30px;
}

/* profile card */
.profile-card{
background-color:#262626;
width:250px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0px 0px 15px rgba(255,255,255,0.1);
transition:transform 0.3s;
align-items: center;
}

.profile-card:hover{
transform:scale(1.05);
}

/* profile image */
.profile-card img{
border-radius:50%;
border:2px solid white;
align-items: center;
}

/* follow button */
button{
background-color:#0095f6;
color:white;
border:none;
padding:8px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:background-color 0.3s;
align-items: center;
}

button:hover{
background-color:#1877f2;
}

/* footer nav */
footer{
position:fixed;
bottom:0;
width:100%;
background-color:black;
border-top:1px solid #333;
padding:10px 0;
}

footer img{
transition:transform 0.2s;
}

footer img:hover{
transform:scale(1.2);
}

</style>

</head>

<body>

<div class="icons">
<span>+</span>
<span class="logo">Instagram</span>
<span>&#9829</span>
</div>


<div class="story-section">

<a href="audio.html" target="blank">
<img src="neeli.png" height="80px" width="80px">
</a>

<a href="video.html" target="blank">
<p style="color:white">your story</p>
</a>

</div>


<div>
<video height="300px" width="300px" controls autoplay muted>
<source src="reel.mp4" type="video/mp4">
</video>
</div>


<div>
<video height="300px" width="300px" controls autoplay muted>
<source src="neeli.mp4" type="video/mp4">
</video>
</div>


<div style="text-align:center;color:white" align="center">

<h2>Welcome to Instagram</h2>

<pre style="color:grey">
Follow people to start seeing the photos and videos
they share
</pre>

</div>


<div class="profile-card">

<img src="neeli.png" height="80px" width="80px" align="center">

<p style="color:white" align="center">account name</p>

<p style="color:#0095f6" align="center">username</p>

<p align="center">&#128274</p>

<p style="color:white" align="center">this account is private</p>

<p style="color:white" align="center">followed by xxxx</p>

<button  align="center">follow</button>

</div>


<br><br><br><br>


<footer>

<nav style="display:flex;justify-content:space-around;align-items:center;">

<div>
<img src="home_symbol.webp" height="30" width="30">
</div>

<div>
<img src="reels.webp" height="40" width="40">
</div>

<div>
<a href="table.html">
<img src="share_symbol.webp" height="40" width="40">
</a>
</div>

<div>
<a href="reel.html">
<img src="search_symbol.webp" height="40" width="40">
</a>
</div>

<div>
<a href="forms.html">
<img src="profile.webp" height="40" width="40">
</a>
</div>

</nav>

</footer>



<script>

// FOLLOW BUTTON FUNCTION
let followBtn = document.querySelector("button");

followBtn.onclick = function(){
if(followBtn.innerText == "follow"){
followBtn.innerText = "following";
followBtn.style.backgroundColor = "green";
}
else{
followBtn.innerText = "follow";
followBtn.style.backgroundColor = "#0095f6";
}
}


// LIKE HEART FUNCTION
let heart = document.querySelector(".icons span:last-child");

heart.onclick = function(){
if(heart.style.color == "red"){
heart.style.color = "white";
}
else{
heart.style.color = "red";
}
}


// STORY CLICK MESSAGE
let story = document.querySelector("img");

story.onclick = function(){
alert("Opening your story...");
}


// VIDEO PLAY MESSAGE
let videos = document.querySelectorAll("video");

videos.forEach(function(v){
v.onclick = function(){
console.log("Reel is playing...");
}
})

</script>

</body>
</html>
